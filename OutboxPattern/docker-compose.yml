services:
  postgres:
    image: postgres:16-alpine
    container_name: outbox-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: outbox_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
