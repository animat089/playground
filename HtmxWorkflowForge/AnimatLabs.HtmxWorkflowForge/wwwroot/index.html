<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkflowForge + HTMX Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2"
            integrity="sha384-fw+eTlCc4ckMBMGrowWB2RAkmsXFRMCEfl0Cb3NikWxYSj6ROqGRwIuenYdxkRwB"
            crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f172a; color: #e2e8f0;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 2rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f8fafc; }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
        .controls { display: flex; gap: 1rem; margin-bottom: 2rem; }
        button {
            padding: 0.6rem 1.4rem; border: none; border-radius: 0.5rem;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-success { background: #22c55e; color: #0f172a; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-reset { background: #334155; color: #94a3b8; }
        .btn-reset:hover { background: #475569; }
        #workflow-panel {
            width: 100%; max-width: 600px; background: #1e293b;
            border-radius: 0.75rem; padding: 1.5rem; min-height: 200px;
        }
        #steps { display: flex; flex-direction: column; gap: 0.5rem; }
        .step {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem; border-radius: 0.5rem;
            font-size: 0.9rem; transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .step-icon { font-size: 1.1rem; width: 1.5rem; text-align: center; }
        .step-name { font-weight: 600; min-width: 140px; }
        .step-detail { color: #94a3b8; font-size: 0.85rem; }
        .step-pending { background: #1e293b; border: 1px solid #334155; }
        .step-running { background: #1e3a5f; border: 1px solid #3b82f6; }
        .step-running .step-icon { color: #60a5fa; }
        .step-completed { background: #14532d; border: 1px solid #22c55e; }
        .step-completed .step-icon { color: #4ade80; }
        .step-failed { background: #450a0a; border: 1px solid #ef4444; }
        .step-failed .step-icon { color: #f87171; }
        .step-compensating { background: #451a03; border: 1px solid #f59e0b; }
        .step-compensating .step-icon { color: #fbbf24; }
        .step-compensated { background: #1c1917; border: 1px solid #a16207; }
        .step-compensated .step-icon { color: #d97706; }
        .status-success {
            padding: 1rem; border-radius: 0.5rem; margin-top: 1rem;
            background: #14532d; border: 1px solid #22c55e;
            color: #4ade80; text-align: center; font-weight: 600;
        }
        .status-failed {
            padding: 1rem; border-radius: 0.5rem; margin-top: 1rem;
            background: #450a0a; border: 1px solid #ef4444;
            color: #f87171; text-align: center; font-weight: 600;
        }
        .empty-state {
            text-align: center; color: #475569; padding: 2rem;
            font-style: italic;
        }
        .footer {
            margin-top: 2rem; color: #475569; font-size: 0.8rem; text-align: center;
        }
        .footer a { color: #60a5fa; text-decoration: none; }
    </style>
</head>
<body>
    <h1>WorkflowForge + HTMX</h1>
    <p class="subtitle">Real-time workflow dashboard with Server-Sent Events. Zero JavaScript frameworks.</p>

    <div class="controls">
        <button class="btn-success" onclick="startWorkflow(false)">Run Order Workflow</button>
        <button class="btn-danger" onclick="startWorkflow(true)">Run with Failure</button>
        <button class="btn-reset" onclick="resetDashboard()">Reset</button>
    </div>

    <div id="workflow-panel">
        <div id="steps">
            <div class="empty-state">Click a button to start a workflow</div>
        </div>
        <div id="final-status"></div>
    </div>

    <div class="footer">
        <p>HTMX handles the UI. WorkflowForge orchestrates the process.</p>
        <p><a href="https://github.com/animatlabs/workflow-forge">WorkflowForge 2.1.1</a> &middot; <a href="https://htmx.org">HTMX</a> &middot; <a href="https://animatlabs.com">AnimatLabs</a></p>
    </div>

    <script>
        function startWorkflow(fail) {
            document.getElementById('steps').innerHTML = '';
            document.getElementById('final-status').innerHTML = '';

            const evtSource = new EventSource('/workflow/start?fail=' + fail);

            evtSource.addEventListener('step', function(e) {
                const steps = document.getElementById('steps');
                const temp = document.createElement('div');
                temp.innerHTML = e.data;
                const newStep = temp.firstChild;
                const existingStep = document.getElementById(newStep.id);
                if (existingStep) {
                    existingStep.replaceWith(newStep);
                } else {
                    steps.appendChild(newStep);
                }
            });

            evtSource.addEventListener('done', function(e) {
                document.getElementById('final-status').innerHTML = e.data;
                evtSource.close();
            });

            evtSource.onerror = function() {
                evtSource.close();
            };
        }

        function resetDashboard() {
            document.getElementById('steps').innerHTML =
                '<div class="empty-state">Click a button to start a workflow</div>';
            document.getElementById('final-status').innerHTML = '';
        }
    </script>
</body>
</html>
